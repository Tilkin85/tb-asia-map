<script>
  function escapeHtml(value) {
    return String(value ?? "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  const map = L.map("map", {
    zoomControl: true
  }).setView([28.0, 117.0], 4);

  const imagery = L.tileLayer(
    "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
    {
      attribution: '&copy; Esri, Maxar, Earthstar Geographics, and the GIS User Community',
      maxZoom: 19
    }
  );

  const labels = L.tileLayer(
    "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
    {
      attribution: '&copy; Esri',
      maxZoom: 19,
      pane: "overlayPane"
    }
  );

  imagery.addTo(map);
  labels.addTo(map);

  L.control.layers(
    { "Aerial View": imagery },
    { "Place Labels": labels },
    { collapsed: false }
  ).addTo(map);

  const sites = [
    {
      site: "Chingsuichongshe",
      country: "Taiwan",
      admin: "City of Taichung",
      lat: 24.1477,
      lng: 120.6736,
      notes: ""
    },
    {
      site: "Liuwei Cemetery",
      country: "China",
      admin: "Shaanxi Province",
      lat: 34.3416,
      lng: 108.9398,
      notes: ""
    },
    {
      site: "Meishan",
      country: "China",
      admin: "Henan Province",
      lat: 34.7473,
      lng: 113.6254,
      notes: ""
    },
    {
      site: "Mawangtui",
      country: "China",
      admin: "City of Changsha, Hunan Province",
      lat: 28.2278,
      lng: 112.9388,
      notes: ""
    },
    {
      site: "Nukdo",
      country: "Korea",
      admin: "Unknown / confirm city",
      lat: 35.1000,
      lng: 128.9000,
      notes: "Approximate location"
    },
    {
      site: "Aoyakamijichi",
      country: "Japan",
      admin: "Unknown / confirm city",
      lat: 35.6895,
      lng: 139.6917,
      notes: "Approximate location"
    },
    {
      site: "Noen U-Loke",
      country: "Thailand",
      admin: "Mun River Valley, Northeast Thailand",
      lat: 15.2200,
      lng: 102.1200,
      notes: "Approximate location"
    }
  ];

  const markerLayer = L.layerGroup().addTo(map);
  const bounds = [];

  sites.forEach((p) => {
    if (!Number.isFinite(p.lat) || !Number.isFinite(p.lng)) return;

    const marker = L.circleMarker([p.lat, p.lng], {
      radius: 6,
      weight: 1,
      opacity: 1,
      fillOpacity: 0.85
    }).addTo(markerLayer);

    const html = `
      <div class="infowin">
        <h3>${escapeHtml(p.site)}</h3>
        <div class="row"><b>Country:</b> ${escapeHtml(p.country)}</div>
        <div class="row"><b>City/Region:</b> ${escapeHtml(p.admin)}</div>
        ${p.notes ? `<div class="row"><b>Notes:</b> ${escapeHtml(p.notes)}</div>` : ""}
        <div class="row"><b>Coordinates:</b> ${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}</div>
      </div>
    `;

    marker.bindPopup(html);
    bounds.push([p.lat, p.lng]);
  });

  if (bounds.length) {
    map.fitBounds(bounds, { padding: [30, 30] });
  }
</script>
