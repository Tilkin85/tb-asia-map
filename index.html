<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>East and Southeast Asia Archaeological Sites Map</title>

  <!-- Leaflet CSS -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    html,
    body {
      height: 100%;
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f5f5f5;
    }

    header {
      padding: 14px 18px;
      background: #222;
      color: white;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
      z-index: 1000;
      position: relative;
    }

    header h1 {
      margin: 0;
      font-size: 1.25rem;
      line-height: 1.3;
    }

    header p {
      margin: 6px 0 0;
      font-size: 0.9rem;
      color: #e6e6e6;
    }

    #map {
      height: calc(100vh - 82px);
      width: 100%;
    }

    .infowin h3 {
      margin: 0 0 8px;
      font-size: 1rem;
    }

    .infowin .row {
      margin: 4px 0;
      font-size: 0.9rem;
    }

    .leaflet-control-layers {
      font-size: 0.9rem;
    }

    @media (max-width: 600px) {
      header h1 {
        font-size: 1rem;
      }

      header p {
        font-size: 0.8rem;
      }

      #map {
        height: calc(100vh - 96px);
      }
    }
  </style>
</head>
<body>
  <header>
    <h1>East and Southeast Asia Archaeological Sites Map</h1>
    <p>Aerial basemap with English place labels and site markers.</p>
  </header>

  <main id="map" aria-label="Interactive map of archaeological sites"></main>

  <!-- Leaflet JavaScript -->
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    const map = L.map("map", {
      zoomControl: true
    }).setView([28.0, 117.0], 4);

    const imagery = L.tileLayer(
      "https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}",
      {
        attribution: '&copy; Esri, Maxar, Earthstar Geographics, and the GIS User Community',
        maxZoom: 19
      }
    );

    const labels = L.tileLayer(
      "https://services.arcgisonline.com/ArcGIS/rest/services/Reference/World_Boundaries_and_Places/MapServer/tile/{z}/{y}/{x}",
      {
        attribution: '&copy; Esri',
        maxZoom: 19,
        pane: "overlayPane"
      }
    );

    imagery.addTo(map);
    labels.addTo(map);

    L.control.layers(
      { "Aerial View": imagery },
      { "English Place Labels": labels },
      { collapsed: false }
    ).addTo(map);

    const sites = [
      {
        site: "Chingsuichongshe",
        country: "Taiwan",
        admin: "City of Taichung",
        lat: 24.1477,
        lng: 120.6736,
        notes: ""
      },
      {
        site: "Liuwei Cemetery",
        country: "China",
        admin: "Shaanxi Province",
        lat: 34.3416,
        lng: 108.9398,
        notes: ""
      },
      {
        site: "Meishan",
        country: "China",
        admin: "Henan Province",
        lat: 34.7473,
        lng: 113.6254,
        notes: ""
      },
      {
        site: "Mawangtui",
        country: "China",
        admin: "City of Changsha, Hunan Province",
        lat: 28.2278,
        lng: 112.9388,
        notes: ""
      },
      {
        site: "Nukdo",
        country: "Korea",
        admin: "Near Sacheon, South Korea",
        lat: 34.9828,
        lng: 128.0570,
        notes: "Approximate location"
      },
      {
        site: "Aoyakamijichi",
        country: "Japan",
        admin: "Tottori Prefecture, Japan",
        lat: 35.5000,
        lng: 134.1700,
        notes: "Approximate location"
      },
      {
        site: "Noen U-Loke",
        country: "Thailand",
        admin: "Mun River Valley, Northeast Thailand",
        lat: 15.2200,
        lng: 102.1200,
        notes: "Approximate location"
      }
    ];

    const markerLayer = L.layerGroup().addTo(map);
    const bounds = [];

    sites.forEach((p) => {
      if (!Number.isFinite(p.lat) || !Number.isFinite(p.lng)) return;

      const marker = L.circleMarker([p.lat, p.lng], {
        radius: 7,
        weight: 2,
        opacity: 1,
        fillOpacity: 0.85
      }).addTo(markerLayer);

      const html = `
        <div class="infowin">
          <h3>${escapeHtml(p.site)}</h3>
          <div class="row"><b>Country:</b> ${escapeHtml(p.country)}</div>
          <div class="row"><b>City/Region:</b> ${escapeHtml(p.admin)}</div>
          ${p.notes ? `<div class="row"><b>Notes:</b> ${escapeHtml(p.notes)}</div>` : ""}
          <div class="row"><b>Coordinates:</b> ${p.lat.toFixed(4)}, ${p.lng.toFixed(4)}</div>
        </div>
      `;

      marker.bindPopup(html);
      bounds.push([p.lat, p.lng]);
    });

    if (bounds.length) {
      map.fitBounds(bounds, { padding: [35, 35] });
    }
  </script>
</body>
</html>
